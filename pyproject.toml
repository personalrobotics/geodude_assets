[build-system]
requires = ["setuptools >= 77.0.3"]
build-backend = "setuptools.build_meta"

[project]
name = "geodude_assets"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "dm_control",
    "loop_rate_limiters",
    "mujoco",
    "mink",
    "ruff",
]

[project.urls]
Source = "https://github.com/personalrobotics/geodude_assets"
Tracker = "https://github.com/personalrobotics/geodude_assets/issues"

# Don't look for packages or modules within this repo (just install dependencies)
[tool.setuptools]
packages = []

[tool.ruff]
lint.select = [
  # pyflakes
  "F",
  # pycodestyle
  "E",
  "W",
  # isort
  "I"
]
